<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TENACIOUS TAMARAWS - Request a Call</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1b5e20,#66bb6a);
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.brand{
    text-align:center;
    margin-bottom:20px;
}

.brand h1{
    margin:0;
    font-size:26px;
    color:#1b5e20;
    letter-spacing:1px;
}

.brand p{
    margin:5px 0 0 0;
    color:#888;
    font-size:14px;
}

label{
    font-weight:bold;
    font-size:14px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    background:#1b5e20;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#0f3d15;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#999;
}

</style>

</head>

<body>

<div class="container">

<div class="brand">
<h1>TENACIOUS TAMARAWS</h1>
<p>Request a Call From Our Team</p>
</div>

<form id="callbackForm">

<label>Phone Number</label>
<input type="text" id="number1" placeholder="e.g. 09171234567" required>

<label>First Name</label>
<input type="text" id="first_name" placeholder="Your first name" required>

<label>Last Name</label>
<input type="text" id="last_name" placeholder="Your last name" required>

<button type="submit">Request Callback</button>

</form>

<div class="footer">
Powered by Five9 Web2Campaign
</div>

</div>

<script>

document.getElementById("callbackForm").addEventListener("submit", function(e){

e.preventDefault();

const number1 = document.getElementById("number1").value;
const firstName = document.getElementById("first_name").value;
const lastName = document.getElementById("last_name").value;

if(number1.length < 10){
    alert("Please enter a valid phone number.");
    return;
}

const baseURL = "https://api.five9.com/web2campaign/AddToList";

const url =
baseURL +
"?F9domain=" + encodeURIComponent("Five9 TAM DEMO - Frechi Van Kahambing") +
"&F9list=" + encodeURIComponent("List10") +
"&number1=" + encodeURIComponent(number1) +
"&first_name=" + encodeURIComponent(firstName) +
"&last_name=" + encodeURIComponent(lastName);

fetch(url)
.then(response => response.text())
.then(data => {

alert("✅ Request Sent!\n\nExpect a call from one of our agents shortly.");

document.getElementById("callbackForm").reset();

})
.catch(error => {

alert("❌ There was an error sending your request. Please try again.");

});

});

</script>

</body>
</html>
